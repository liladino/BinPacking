<!DOCTYPE html>
<html>
<head>
    <title>3D Bin Packing Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    3000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// const light = new THREE.DirectionalLight(0xffffff, 1);
// light.position.set(20, 20, 20);
// scene.add(light);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1); // Sky, Ground, Intensity
scene.add(hemiLight);

scene.add(new THREE.AmbientLight(0x404040));

// ------------------------
// Load bin and items
// ------------------------
const padding = 1; 
async function loadBinData(url) {
    const response = await fetch(url);
    const data = await response.json();

    const binGeom = new THREE.BoxGeometry(data.bin.w + padding, data.bin.h+ padding, data.bin.d + padding);
    const binLines = new THREE.LineSegments(
        new THREE.EdgesGeometry(binGeom),
        new THREE.LineBasicMaterial({ color: 0x000000 })
    );
    binLines.position.set(data.bin.w/2, data.bin.h/2, data.bin.d/2);
    scene.add(binLines);

    data.items.forEach(item => {
        addBox(item);
    });

    // Camera
    controls.target.set(data.bin.w/2, data.bin.h/2, data.bin.d/2); 
    camera.position.set(1.5 * data.bin.w, 1.5 * data.bin.h, 1.5 * data.bin.d);
    // camera.position.set(0 * data.bin.w, 0 * data.bin.h, 5 * data.bin.d);
}

loadBinData('data.json');

function addBox(b) {
	const geometry = new THREE.BoxGeometry(
		b.w - padding, 
		b.h - padding, 
		b.d - padding
	);
    // const geometry = new THREE.BoxGeometry(b.w, b.h, b.d);

    const material = new THREE.MeshPhongMaterial({
        color: (1 - Math.random() ** 3) * 0xffffff,
        transparent: false,
        // opacity: 0.7,
        // side: THREE.DoubleSide,
        depthWrite: true
    });


    const mesh = new THREE.Mesh(geometry, material);

    const edgeGeom = new THREE.EdgesGeometry(geometry);
    const edgeLines = new THREE.LineSegments(
        edgeGeom,
        new THREE.LineBasicMaterial({ color: 0x000000 })
    );

    const group = new THREE.Group();
    group.add(mesh);
    group.add(edgeLines);

    // Set position based on the corner (0,0,0)
    group.position.set(
        b.x + b.w / 2,
        b.y + b.h / 2,
        b.z + b.d / 2
    );

    scene.add(group);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
