<!DOCTYPE html>
<html>
<head>
    <title>3D Bin Packing Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 20, 20);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// ------------------------
// BIN (edges only)
// ------------------------
const bin = { w: 10, h: 10, d: 10 };
const padding = 0.01; // Even a tiny amount prevents the flicker

// Create geometry slightly larger than the logical bin
const binGeometry = new THREE.BoxGeometry(
    bin.w + padding, 
    bin.h + padding, 
    bin.d + padding
);

// const binGeometry = new THREE.BoxGeometry(bin.w, bin.h, bin.d);
const edges = new THREE.EdgesGeometry(binGeometry);
const binLines = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({ color: 0x000000 })
);

// Position the bin wireframe so (0,0,0) is the bottom-left-front corner
binLines.position.set(bin.w / 2, bin.h / 2, bin.d / 2);
scene.add(binLines);

// ------------------------
// BOXES
// ------------------------
const boxes = [
    { x: 0, y: 0, z: 0, w: 4, h: 4, d: 4 },
    { x: 4, y: 0, z: 0, w: 3, h: 5, d: 2 },
    { x: 0, y: 4, z: 0, w: 2, h: 3, d: 6 },
];

function addBox(b) {
	const geometry = new THREE.BoxGeometry(
		b.w - padding, 
		b.h - padding, 
		b.d - padding
	);
    // const geometry = new THREE.BoxGeometry(b.w, b.h, b.d);

    const material = new THREE.MeshPhongMaterial({
        color: Math.random() * 0xffffff,
        transparent: true,
        opacity: 0.7
    });

    const mesh = new THREE.Mesh(geometry, material);

    const edgeGeom = new THREE.EdgesGeometry(geometry);
    const edgeLines = new THREE.LineSegments(
        edgeGeom,
        new THREE.LineBasicMaterial({ color: 0x000000 })
    );

    const group = new THREE.Group();
    group.add(mesh);
    group.add(edgeLines);

    // Set position based on the corner (0,0,0)
    group.position.set(
        b.x + b.w / 2,
        b.y + b.h / 2,
        b.z + b.d / 2
    );

    scene.add(group);
}

boxes.forEach(addBox);

// ------------------------
// CAMERA & ANIMATION
// ------------------------
camera.position.set(15, 15, 15);
controls.target.set(bin.w / 2, bin.h / 2, bin.d / 2);

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
